<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 Симулятор кубов VtM</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            text-align: center;
            color: #e94560;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        
        /* Ресурсы */
        .resources-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .resource-card {
            flex: 1;
            min-width: 200px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .resource-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .resource-title {
            font-size: 1.4em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .willpower-title {
            color: #4ecdc4;
        }
        
        .blood-title {
            color: #e94560;
        }
        
        .resource-value {
            font-size: 2em;
            font-weight: bold;
            color: white;
        }
        
        .dots-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .dot:hover {
            transform: scale(1.1);
        }
        
        .willpower-dot {
            background: radial-gradient(circle at 30% 30%, #6ee7b7, #4ecdc4);
            box-shadow: 0 0 10px rgba(78, 205, 196, 0.5);
        }
        
        .willpower-dot.empty {
            background: transparent;
            border: 2px solid rgba(78, 205, 196, 0.3);
        }
        
        .blood-dot {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #e94560);
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        
        .blood-dot.empty {
            background: transparent;
            border: 2px solid rgba(233, 69, 96, 0.3);
        }
        
        .resource-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .resource-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .resource-btn.plus {
            background: rgba(76, 175, 80, 0.8);
            color: white;
        }
        
        .resource-btn.minus {
            background: rgba(244, 67, 54, 0.8);
            color: white;
        }
        
        .resource-btn:hover {
            transform: scale(1.1);
        }
        
        .resource-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Секция броска D10 */
        .dice-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .d10-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .d10-icon {
            font-size: 3em;
            color: #e94560;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .dice-input {
            width: 100px;
            padding: 15px;
            font-size: 1.2em;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            outline: none;
        }
        
        .dice-input:focus {
            border-color: #e94560;
        }
        
        .roll-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #e94560 0%, #c62a47 100%);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        
        .roll-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }
        
        /* Результат броска */
        .result-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .dice-results {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .die-result {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid;
            position: relative;
        }
        
        .die-result.success {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border-color: #4ecdc4;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }
        
        .die-result.critical {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: pulse 1.5s infinite;
        }
        
        .die-result.failure {
            background: rgba(100, 100, 100, 0.3);
            border-color: #666;
            opacity: 0.7;
        }
        
        .die-result.rerolled {
            animation: rerollAnimation 0.5s ease;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes rerollAnimation {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        
        .success-summary {
            text-align: center;
            font-size: 2em;
            margin: 20px 0;
        }
        
        .success-count {
            font-size: 1.5em;
            color: #4ecdc4;
        }
        
        /* Кнопки действий */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .action-btn {
            flex: 1;
            max-width: 250px;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .action-btn.willpower {
            background: linear-gradient(135deg, #4ecdc4, #3ba89f);
            color: white;
        }
        
        .action-btn.blood {
            background: linear-gradient(135deg, #e94560, #c62a47);
            color: white;
        }
        
        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        
        .action-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .action-cost {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 20px 30px;
            border-radius: 10px;
            font-weight: bold;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        
        .notification.failure {
            background: rgba(244, 67, 54, 0.9);
            color: white;
            border-left: 5px solid #d32f2f;
        }
        
        .notification.success {
            background: rgba(76, 175, 80, 0.9);
            color: white;
            border-left: 5px solid #388e3c;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* История */
        .history-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 15px;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .history-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #eee;
        }
        
        .clear-btn {
            padding: 8px 16px;
            background: rgba(220, 53, 69, 0.8);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 10px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 4px solid #e94560;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .help-text {
            text-align: center;
            color: #aaa;
            margin-top: 10px;
            font-size: 0.9em;
        }
        
        .help-text span {
            color: #4ecdc4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩸 Vampire: The Masquerade</h1>
        
        <!-- Панель ресурсов -->
        <div class="resources-panel">
            <!-- Воля -->
            <div class="resource-card">
                <div class="resource-header">
                    <div class="resource-title willpower-title">
                        <span>💫 Воля</span>
                    </div>
                    <div class="resource-value" id="willpowerValue">10</div>
                </div>
                <div class="dots-container" id="willpowerDots"></div>
                <div class="resource-controls">
                    <button class="resource-btn minus" onclick="adjustWillpower(-1)" id="willpowerMinus">−</button>
                    <button class="resource-btn plus" onclick="adjustWillpower(1)" id="willpowerPlus">+</button>
                </div>
            </div>
            
            <!-- Кровь -->
            <div class="resource-card">
                <div class="resource-header">
                    <div class="resource-title blood-title">
                        <span>🩸 Запас крови</span>
                    </div>
                    <div class="resource-value" id="bloodValue">10</div>
                </div>
                <div class="dots-container" id="bloodDots"></div>
                <div class="resource-controls">
                    <button class="resource-btn minus" onclick="adjustBlood(-1)" id="bloodMinus">−</button>
                    <button class="resource-btn plus" onclick="adjustBlood(1)" id="bloodPlus">+</button>
                </div>
            </div>
        </div>
        
        <!-- Секция броска D10 -->
        <div class="dice-section">
            <div class="d10-header">
                <div class="d10-icon">🎲</div>
                <div class="input-group">
                    <input type="number" id="diceCount" class="dice-input" min="1" max="30" value="5">
                    <span style="font-size: 1.5em;">D10</span>
                </div>
                <button class="roll-btn" onclick="rollD10()">Бросить</button>
            </div>
        </div>
        
        <!-- Результат броска -->
        <div class="result-section" id="resultSection" style="display: none;">
            <div class="dice-results" id="diceResults"></div>
            <div class="success-summary">
                <div>Успехов: <span class="success-count" id="successCount">0</span></div>
            </div>
            
            <!-- Кнопки действий -->
            <div class="action-buttons">
                <button class="action-btn willpower" id="spendWillpowerBtn" onclick="spendWillpower()" disabled>
                    <span>💫 Потратить Волю</span>
                    <span class="action-cost">-1 Воля → +1 Успех</span>
                </button>
                <button class="action-btn blood" id="spendBloodBtn" onclick="spendBlood()" disabled>
                    <span>🩸 Потратить Кровь</span>
                    <span class="action-cost">-1 Кровь → Перебросить 1 куб</span>
                </button>
            </div>
        </div>
        
        <!-- История -->
        <div class="history-section">
            <div class="history-header">
                <span class="history-title">📜 История бросков</span>
                <button class="clear-btn" onclick="clearHistory()">Очистить</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-item">История пуста</div>
            </div>
        </div>
        
        <div class="help-text">
            <span>⚡ Чётные числа = Успех</span> | 
            <span>✨ 10 = Двойной успех</span> | 
            <span>❌ Нечётные = Неудача</span>
        </div>
    </div>

    <script>
        // Состояние игры
        let willpower = 10;
        let bloodPool = 10;
        let currentRolls = [];
        let currentSuccesses = 0;
        let lastRollCount = 0;
        let history = [];
        const MAX_HISTORY = 15;
        
        // Инициализация
        function init() {
            updateWillpowerDisplay();
            updateBloodDisplay();
            updateHistoryDisplay();
        }
        
        // Обновление отображения Воли
        function updateWillpowerDisplay() {
            document.getElementById('willpowerValue').textContent = willpower;
            
            const dotsContainer = document.getElementById('willpowerDots');
            dotsContainer.innerHTML = '';
            
            for (let i = 0; i < 10; i++) {
                const dot = document.createElement('div');
                dot.className = `dot willpower-dot ${i >= willpower ? 'empty' : ''}`;
                dot.onclick = () => setWillpower(i + 1);
                dotsContainer.appendChild(dot);
            }
            
            // Обновление кнопок
            document.getElementById('willpowerMinus').disabled = willpower <= 0;
            document.getElementById('willpowerPlus').disabled = willpower >= 10;
            
            // Обновление кнопки траты Воли
            updateActionButtons();
        }
        
        // Обновление отображения Крови
        function updateBloodDisplay() {
            document.getElementById('bloodValue').textContent = bloodPool;
            
            const dotsContainer = document.getElementById('bloodDots');
            dotsContainer.innerHTML = '';
            
            for (let i = 0; i < 10; i++) {
                const dot = document.createElement('div');
                dot.className = `dot blood-dot ${i >= bloodPool ? 'empty' : ''}`;
                dot.onclick = () => setBlood(i + 1);
                dotsContainer.appendChild(dot);
            }
            
            // Обновление кнопок
            document.getElementById('bloodMinus').disabled = bloodPool <= 0;
            document.getElementById('bloodPlus').disabled = bloodPool >= 10;
            
            // Обновление кнопки траты Крови
            updateActionButtons();
        }
        
        // Установка значения Воли
        function setWillpower(value) {
            willpower = Math.max(0, Math.min(10, value));
            updateWillpowerDisplay();
        }
        
        // Установка значения Крови
        function setBlood(value) {
            bloodPool = Math.max(0, Math.min(10, value));
            updateBloodDisplay();
        }
        
        // Изменение Воли
        function adjustWillpower(delta) {
            setWillpower(willpower + delta);
        }
        
        // Изменение Крови
        function adjustBlood(delta) {
            setBlood(bloodPool + delta);
        }
        
        // Проверка результата броска D10
        function evaluateDie(value) {
            if (value === 10) return { type: 'critical', successes: 2 };
            if (value % 2 === 0) return { type: 'success', successes: 1 };
            return { type: 'failure', successes: 0 };
        }
        
        // Бросок D10
        function rollD10() {
            const count = parseInt(document.getElementById('diceCount').value) || 5;
            const validCount = Math.max(1, Math.min(30, count));
            document.getElementById('diceCount').value = validCount;
            
            currentRolls = [];
            currentSuccesses = 0;
            
            for (let i = 0; i < validCount; i++) {
                const roll = Math.floor(Math.random() * 10) + 1;
                const evaluation = evaluateDie(roll);
                
                currentRolls.push({
                    value: roll,
                    type: evaluation.type,
                    successes: evaluation.successes,
                    rerolled: false
                });
                
                currentSuccesses += evaluation.successes;
            }
            
            lastRollCount = validCount;
            
            displayResults();
            updateActionButtons();
            
            // Показываем секцию результатов
            document.getElementById('resultSection').style.display = 'block';
            
            // Добавляем в историю
            addToHistory(`Бросок ${validCount}D10`, currentSuccesses, currentRolls);
        }
        
        // Отображение результатов
        function displayResults() {
            const container = document.getElementById('diceResults');
            container.innerHTML = '';
            
            currentRolls.forEach((roll, index) => {
                const dieElement = document.createElement('div');
                dieElement.className = `die-result ${roll.type} ${roll.rerolled ? 'rerolled' : ''}`;
                dieElement.textContent = roll.value;
                
                if (roll.type === 'critical') {
                    dieElement.title = 'Критический успех! (+2)';
                } else if (roll.type === 'success') {
                    dieElement.title = 'Успех! (+1)';
                } else {
                    dieElement.title = 'Неудача';
                }
                
                container.appendChild(dieElement);
            });
            
            document.getElementById('successCount').textContent = currentSuccesses;
        }
        
        // Обновление кнопок действий
        function updateActionButtons() {
            const willpowerBtn = document.getElementById('spendWillpowerBtn');
            const bloodBtn = document.getElementById('spendBloodBtn');
            
            // Кнопка Воли доступна, если есть Воля и был совершен бросок
            willpowerBtn.disabled = willpower <= 0 || currentRolls.length === 0;
            
            // Кнопка Крови доступна, если есть Кровь, был бросок и есть кубы для переброса
            const hasRerollableDice = currentRolls.some(roll => roll.type === 'failure');
            bloodBtn.disabled = bloodPool <= 0 || currentRolls.length === 0 || !hasRerollableDice;
        }
        
        // Потратить Волю
        function spendWillpower() {
            if (willpower <= 0 || currentRolls.length === 0) return;
            
            willpower--;
            currentSuccesses += 1;
            
            updateWillpowerDisplay();
            displayResults();
            updateActionButtons();
            
            showNotification('Успех добавлен! (+1)', 'success');
            addToHistory('💫 Трата Воли', currentSuccesses, currentRolls, '+1 успех');
        }
        
        // Потратить Кровь (переброс одного неудачного куба)
        function spendBlood() {
            if (bloodPool <= 0 || currentRolls.length === 0) return;
            
            // Находим первый неудачный куб
            const failureIndex = currentRolls.findIndex(roll => roll.type === 'failure');
            
            if (failureIndex === -1) {
                showNotification('Нет кубов для переброса!', 'failure');
                return;
            }
            
            bloodPool--;
            updateBloodDisplay();
            
            // Запоминаем старое значение
            const oldRoll = currentRolls[failureIndex];
            const oldValue = oldRoll.value;
            
            // Бросаем заново
            const newValue = Math.floor(Math.random() * 10) + 1;
            const evaluation = evaluateDie(newValue);
            
            // Обновляем куб
            currentRolls[failureIndex] = {
                value: newValue,
                type: evaluation.type,
                successes: evaluation.successes,
                rerolled: true
            };
            
            // Пересчитываем успехи
            currentSuccesses = currentRolls.reduce((sum, roll) => sum + roll.successes, 0);
            
            displayResults();
            updateActionButtons();
            
            // Проверяем результат переброса
            if (evaluation.type === 'failure') {
                showNotification('Неудача! Переброс не помог 😔', 'failure');
                addToHistory('🩸 Трата Крови', currentSuccesses, currentRolls, `Переброс ${oldValue}→${newValue} (неудача)`);
            } else {
                const successText = evaluation.type === 'critical' ? 'Критический успех!' : 'Успех!';
                showNotification(`${successText} Переброс удачен! ✨`, 'success');
                addToHistory('🩸 Трата Крови', currentSuccesses, currentRolls, `Переброс ${oldValue}→${newValue} (успех)`);
            }
        }
        
        // Показ уведомления
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // Добавление в историю
        function addToHistory(action, successes, rolls, note = '') {
            const diceResults = rolls.map(r => {
                if (r.type === 'critical') return `${r.value}✨`;
                if (r.type === 'success') return `${r.value}✓`;
                return `${r.value}`;
            }).join(' ');
            
            const record = {
                action: action,
                successes: successes,
                diceResults: diceResults,
                note: note,
                timestamp: new Date().toLocaleTimeString()
            };
            
            history.unshift(record);
            
            if (history.length > MAX_HISTORY) {
                history.pop();
            }
            
            updateHistoryDisplay();
        }
        
        // Обновление отображения истории
        function updateHistoryDisplay() {
            const historyElement = document.getElementById('historyList');
            
            if (history.length === 0) {
                historyElement.innerHTML = '<div class="history-item">История пуста</div>';
                return;
            }
            
            historyElement.innerHTML = history.map((record, index) => {
                const noteText = record.note ? ` (${record.note})` : '';
                return `
                    <div class="history-item">
                        ${record.timestamp} | ${record.action}: ${record.successes} успехов${noteText}<br>
                        <span style="opacity: 0.7;">🎲 ${record.diceResults}</span>
                    </div>
                `;
            }).join('');
        }
        
        // Очистка истории
        function clearHistory() {
            history = [];
            updateHistoryDisplay();
        }
        
        // Запуск инициализации
        init();
    </script>
</body>
</html>
