<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 World of Darkness - Система кубов</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(200, 180, 140, 0.2);
        }
        
        h1 {
            text-align: center;
            color: #c9b37c;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(201, 179, 124, 0.3);
            letter-spacing: 2px;
        }
        
        .subtitle {
            text-align: center;
            color: #8a7b6b;
            margin-bottom: 30px;
            font-style: italic;
            font-size: 1.1em;
        }
        
        /* Ресурсы */
        .resources-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .resource-card {
            flex: 1;
            min-width: 200px;
            background: rgba(15, 15, 25, 0.6);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(201, 179, 124, 0.2);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        
        .resource-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .resource-title {
            font-size: 1.4em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .willpower-title {
            color: #7eb8c9;
        }
        
        .specialty-title {
            color: #c9b37c;
        }
        
        .resource-value {
            font-size: 2em;
            font-weight: bold;
            color: #e0e0e0;
        }
        
        .dots-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(200, 180, 140, 0.3);
            position: relative;
        }
        
        .dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(200,180,140,0.5));
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .dot.filled::after {
            opacity: 1;
        }
        
        .dot:hover {
            transform: scale(1.1);
            border-color: rgba(201, 179, 124, 0.8);
        }
        
        .willpower-dot {
            background: rgba(126, 184, 201, 0.1);
        }
        
        .willpower-dot.filled {
            border-color: #7eb8c9;
            box-shadow: 0 0 15px rgba(126, 184, 201, 0.4);
        }
        
        .specialty-dot {
            background: rgba(201, 179, 124, 0.1);
        }
        
        .specialty-dot.filled {
            border-color: #c9b37c;
            box-shadow: 0 0 15px rgba(201, 179, 124, 0.4);
        }
        
        .resource-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .resource-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid rgba(201, 179, 124, 0.3);
            background: rgba(15, 15, 25, 0.8);
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c9b37c;
        }
        
        .resource-btn:hover {
            background: rgba(201, 179, 124, 0.2);
            border-color: #c9b37c;
            transform: scale(1.05);
        }
        
        .resource-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Секция броска D10 */
        .dice-section {
            background: rgba(15, 15, 25, 0.5);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(201, 179, 124, 0.15);
        }
        
        .d10-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .d10-icon {
            font-size: 2.5em;
            color: #c9b37c;
            text-shadow: 0 0 10px rgba(201, 179, 124, 0.3);
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .dice-input {
            width: 100px;
            padding: 12px;
            font-size: 1.3em;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(201, 179, 124, 0.3);
            border-radius: 10px;
            color: #e0e0e0;
            outline: none;
            font-weight: bold;
        }
        
        .dice-input:focus {
            border-color: #c9b37c;
            box-shadow: 0 0 15px rgba(201, 179, 124, 0.2);
        }
        
        .dice-label {
            font-size: 1.5em;
            color: #c9b37c;
            font-weight: bold;
        }
        
        .roll-btn {
            padding: 12px 40px;
            font-size: 1.3em;
            font-weight: bold;
            border: 2px solid #c9b37c;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(201, 179, 124, 0.2), rgba(201, 179, 124, 0.1));
            color: #c9b37c;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .roll-btn:hover {
            background: linear-gradient(135deg, rgba(201, 179, 124, 0.3), rgba(201, 179, 124, 0.2));
            box-shadow: 0 0 25px rgba(201, 179, 124, 0.3);
            transform: translateY(-2px);
        }
        
        /* Результат броска */
        .result-section {
            background: rgba(15, 15, 25, 0.5);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(201, 179, 124, 0.15);
        }
        
        .dice-results {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
            min-height: 80px;
        }
        
        .die-result {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid;
            position: relative;
            transition: all 0.3s;
        }
        
        .die-result.success {
            background: linear-gradient(135deg, #2a4a3f, #1a3a2f);
            border-color: #4a9e7b;
            box-shadow: 0 0 20px rgba(74, 158, 123, 0.4);
            color: #7ecca8;
        }
        
        .die-result.critical {
            background: linear-gradient(135deg, #4a3a1a, #3a2a0a);
            border-color: #c9b37c;
            box-shadow: 0 0 25px rgba(201, 179, 124, 0.6);
            color: #ffd700;
            animation: criticalPulse 2s infinite;
        }
        
        .die-result.failure {
            background: rgba(40, 40, 50, 0.4);
            border-color: #5a5a6a;
            opacity: 0.6;
            color: #8a8a9a;
        }
        
        .die-result.rerolled {
            animation: rerollAnimation 0.6s ease;
        }
        
        @keyframes criticalPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        @keyframes rerollAnimation {
            0% { transform: rotateY(0deg); opacity: 0.5; }
            50% { transform: rotateY(180deg); }
            100% { transform: rotateY(360deg); opacity: 1; }
        }
        
        .success-summary {
            text-align: center;
            font-size: 1.8em;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        
        .success-count {
            font-size: 1.3em;
            color: #c9b37c;
            font-weight: bold;
        }
        
        .willpower-used-indicator {
            display: inline-block;
            margin-left: 10px;
            color: #7eb8c9;
            font-size: 0.9em;
        }
        
        /* Кнопки действий */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            flex: 1;
            min-width: 200px;
            max-width: 280px;
            padding: 15px 20px;
            font-size: 1.1em;
            font-weight: bold;
            border: 2px solid;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(15, 15, 25, 0.6);
        }
        
        .action-btn.willpower {
            border-color: #7eb8c9;
            color: #7eb8c9;
        }
        
        .action-btn.willpower:not(:disabled):hover {
            background: rgba(126, 184, 201, 0.15);
            box-shadow: 0 0 20px rgba(126, 184, 201, 0.3);
            transform: translateY(-2px);
        }
        
        .action-btn.specialty {
            border-color: #c9b37c;
            color: #c9b37c;
        }
        
        .action-btn.specialty:not(:disabled):hover {
            background: rgba(201, 179, 124, 0.15);
            box-shadow: 0 0 20px rgba(201, 179, 124, 0.3);
            transform: translateY(-2px);
        }
        
        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            border-color: #5a5a6a;
            color: #8a8a9a;
        }
        
        .action-cost {
            font-size: 0.85em;
            opacity: 0.8;
        }
        
        .action-used {
            color: #4a9e7b;
            font-size: 0.85em;
        }
        
        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 18px 25px;
            border-radius: 10px;
            font-weight: bold;
            animation: slideIn 0.3s ease;
            z-index: 1000;
            border-left: 5px solid;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        
        .notification.failure {
            background: rgba(139, 0, 0, 0.9);
            color: #ffcccc;
            border-left-color: #ff4444;
        }
        
        .notification.success {
            background: rgba(0, 100, 0, 0.9);
            color: #ccffcc;
            border-left-color: #44ff44;
        }
        
        .notification.info {
            background: rgba(70, 70, 100, 0.9);
            color: #e0e0ff;
            border-left-color: #7eb8c9;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* История */
        .history-section {
            background: rgba(15, 15, 25, 0.5);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(201, 179, 124, 0.15);
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .history-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #c9b37c;
        }
        
        .clear-btn {
            padding: 8px 16px;
            background: rgba(139, 0, 0, 0.3);
            color: #ffaaaa;
            border: 1px solid #8b0000;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .clear-btn:hover {
            background: rgba(139, 0, 0, 0.5);
        }
        
        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 10px 15px;
            margin-bottom: 5px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border-left: 4px solid #c9b37c;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #b0b0c0;
        }
        
        .help-text {
            text-align: center;
            color: #8a7b6b;
            margin-top: 15px;
            font-size: 0.9em;
        }
        
        .help-text span {
            color: #c9b37c;
            margin: 0 10px;
        }
        
        /* Адаптивность */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .d10-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .die-result {
                width: 50px;
                height: 50px;
                font-size: 1.5em;
            }
            
            .action-btn {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌑 WORLD OF DARKNESS</h1>
        <div class="subtitle">Storyteller System • D10 Dice Pool</div>
        
        <!-- Панель ресурсов -->
        <div class="resources-panel">
            <!-- Воля -->
            <div class="resource-card">
                <div class="resource-header">
                    <div class="resource-title willpower-title">
                        <span>💫 Воля</span>
                    </div>
                    <div class="resource-value" id="willpowerValue">10</div>
                </div>
                <div class="dots-container" id="willpowerDots"></div>
                <div class="resource-controls">
                    <button class="resource-btn" onclick="adjustWillpower(-1)" id="willpowerMinus">−</button>
                    <button class="resource-btn" onclick="adjustWillpower(1)" id="willpowerPlus">+</button>
                </div>
                <div style="text-align: center; margin-top: 10px; color: #7eb8c9; font-size: 0.9em; opacity: 0.8;">
                    +1 успех за бросок
                </div>
            </div>
            
            <!-- Особенность -->
            <div class="resource-card">
                <div class="resource-header">
                    <div class="resource-title specialty-title">
                        <span>✨ Особенность</span>
                    </div>
                    <div class="resource-value" id="specialtyValue">10</div>
                </div>
                <div class="dots-container" id="specialtyDots"></div>
                <div class="resource-controls">
                    <button class="resource-btn" onclick="adjustSpecialty(-1)" id="specialtyMinus">−</button>
                    <button class="resource-btn" onclick="adjustSpecialty(1)" id="specialtyPlus">+</button>
                </div>
                <div style="text-align: center; margin-top: 10px; color: #c9b37c; font-size: 0.9em; opacity: 0.8;">
                    Переброс одного куба
                </div>
            </div>
        </div>
        
        <!-- Секция броска D10 -->
        <div class="dice-section">
            <div class="d10-header">
                <div class="d10-icon">🎲</div>
                <div class="input-group">
                    <input type="number" id="diceCount" class="dice-input" min="1" max="30" value="5">
                    <span class="dice-label">D10</span>
                </div>
                <button class="roll-btn" onclick="rollD10()">Бросок</button>
            </div>
        </div>
        
        <!-- Результат броска -->
        <div class="result-section" id="resultSection" style="display: none;">
            <div class="dice-results" id="diceResults"></div>
            <div class="success-summary">
                <div>
                    Успехов: <span class="success-count" id="successCount">0</span>
                    <span id="willpowerUsedIndicator" class="willpower-used-indicator"></span>
                </div>
            </div>
            
            <!-- Кнопки действий -->
            <div class="action-buttons">
                <button class="action-btn willpower" id="spendWillpowerBtn" onclick="spendWillpower()" disabled>
                    <span>💫 Использовать Волю</span>
                    <span class="action-cost">-1 Воля → +1 Успех</span>
                    <span id="willpowerUsedText" class="action-used"></span>
                </button>
                <button class="action-btn specialty" id="spendSpecialtyBtn" onclick="spendSpecialty()" disabled>
                    <span>✨ Использовать Особенность</span>
                    <span class="action-cost">-1 Особенность → Переброс</span>
                </button>
            </div>
        </div>
        
        <!-- История -->
        <div class="history-section">
            <div class="history-header">
                <span class="history-title">📜 История бросков</span>
                <button class="clear-btn" onclick="clearHistory()">Очистить</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-item">История пуста</div>
            </div>
        </div>
        
        <div class="help-text">
            <span>⚡ 2,4,6,8 = Успех</span> •
            <span>✨ 10 = Двойной успех</span> •
            <span>❌ 1,3,5,7,9 = Неудача</span>
        </div>
    </div>

    <script>
        // Состояние игры
        let willpower = 10;
        let specialty = 10;
        let currentRolls = [];
        let currentSuccesses = 0;
        let willpowerUsedThisRoll = false;
        let history = [];
        const MAX_HISTORY = 15;
        
        // Инициализация
        function init() {
            updateWillpowerDisplay();
            updateSpecialtyDisplay();
            updateHistoryDisplay();
        }
        
        // Обновление отображения Воли
        function updateWillpowerDisplay() {
            document.getElementById('willpowerValue').textContent = willpower;
            
            const dotsContainer = document.getElementById('willpowerDots');
            dotsContainer.innerHTML = '';
            
            for (let i = 0; i < 10; i++) {
                const dot = document.createElement('div');
                dot.className = `dot willpower-dot ${i < willpower ? 'filled' : ''}`;
                dot.onclick = () => setWillpower(i + 1);
                dotsContainer.appendChild(dot);
            }
            
            document.getElementById('willpowerMinus').disabled = willpower <= 0;
            document.getElementById('willpowerPlus').disabled = willpower >= 10;
            
            updateActionButtons();
        }
        
        // Обновление отображения Особенности
        function updateSpecialtyDisplay() {
            document.getElementById('specialtyValue').textContent = specialty;
            
            const dotsContainer = document.getElementById('specialtyDots');
            dotsContainer.innerHTML = '';
            
            for (let i = 0; i < 10; i++) {
                const dot = document.createElement('div');
                dot.className = `dot specialty-dot ${i < specialty ? 'filled' : ''}`;
                dot.onclick = () => setSpecialty(i + 1);
                dotsContainer.appendChild(dot);
            }
            
            document.getElementById('specialtyMinus').disabled = specialty <= 0;
            document.getElementById('specialtyPlus').disabled = specialty >= 10;
            
            updateActionButtons();
        }
        
        // Установка значения Воли
        function setWillpower(value) {
            willpower = Math.max(0, Math.min(10, value));
            updateWillpowerDisplay();
        }
        
        // Установка значения Особенности
        function setSpecialty(value) {
            specialty = Math.max(0, Math.min(10, value));
            updateSpecialtyDisplay();
        }
        
        // Изменение Воли
        function adjustWillpower(delta) {
            setWillpower(willpower + delta);
        }
        
        // Изменение Особенности
        function adjustSpecialty(delta) {
            setSpecialty(specialty + delta);
        }
        
        // Проверка результата броска D10
        function evaluateDie(value) {
            if (value === 10) return { type: 'critical', successes: 2 };
            if (value % 2 === 0) return { type: 'success', successes: 1 };
            return { type: 'failure', successes: 0 };
        }
        
        // Сброс состояния броска
        function resetRollState() {
            willpowerUsedThisRoll = false;
            document.getElementById('willpowerUsedIndicator').textContent = '';
            document.getElementById('willpowerUsedText').textContent = '';
        }
        
        // Бросок D10
        function rollD10() {
            const count = parseInt(document.getElementById('diceCount').value) || 5;
            const validCount = Math.max(1, Math.min(30, count));
            document.getElementById('diceCount').value = validCount;
            
            resetRollState();
            
            currentRolls = [];
            currentSuccesses = 0;
            
            for (let i = 0; i < validCount; i++) {
                const roll = Math.floor(Math.random() * 10) + 1;
                const evaluation = evaluateDie(roll);
                
                currentRolls.push({
                    value: roll,
                    type: evaluation.type,
                    successes: evaluation.successes,
                    rerolled: false
                });
                
                currentSuccesses += evaluation.successes;
            }
            
            displayResults();
            updateActionButtons();
            
            document.getElementById('resultSection').style.display = 'block';
            
            addToHistory(`Бросок ${validCount}D10`, currentSuccesses, currentRolls);
        }
        
        // Отображение результатов
        function displayResults() {
            const container = document.getElementById('diceResults');
            container.innerHTML = '';
            
            currentRolls.forEach((roll) => {
                const dieElement = document.createElement('div');
                dieElement.className = `die-result ${roll.type} ${roll.rerolled ? 'rerolled' : ''}`;
                dieElement.textContent = roll.value;
                
                if (roll.type === 'critical') {
                    dieElement.title = 'Критический успех! (+2)';
                } else if (roll.type === 'success') {
                    dieElement.title = 'Успех! (+1)';
                } else {
                    dieElement.title = 'Неудача';
                }
                
                container.appendChild(dieElement);
            });
            
            document.getElementById('successCount').textContent = currentSuccesses;
        }
        
        // Обновление кнопок действий
        function updateActionButtons() {
            const willpowerBtn = document.getElementById('spendWillpowerBtn');
            const specialtyBtn = document.getElementById('spendSpecialtyBtn');
            
            // Воля: доступна если есть очки, есть бросок, и ещё не использовалась
            const canUseWillpower = willpower > 0 && currentRolls.length > 0 && !willpowerUsedThisRoll;
            willpowerBtn.disabled = !canUseWillpower;
            
            // Особенность: доступна если есть очки, есть бросок и есть кубы для переброса
            const hasRerollableDice = currentRolls.some(roll => roll.type === 'failure');
            const canUseSpecialty = specialty > 0 && currentRolls.length > 0 && hasRerollableDice;
            specialtyBtn.disabled = !canUseSpecialty;
        }
        
        // Использовать Волю
        function spendWillpower() {
            if (willpower <= 0 || currentRolls.length === 0 || willpowerUsedThisRoll) return;
            
            willpower--;
            willpowerUsedThisRoll = true;
            currentSuccesses += 1;
            
            updateWillpowerDisplay();
            displayResults();
            updateActionButtons();
            
            document.getElementById('willpowerUsedIndicator').textContent = '(Воля использована)';
            document.getElementById('willpowerUsedText').textContent = '✓ Использована';
            
            showNotification('Воля использована! +1 успех', 'success');
            addToHistory('💫 Использование Воли', currentSuccesses, currentRolls, '+1 успех');
        }
        
        // Использовать Особенность (переброс одного неудачного куба)
        function spendSpecialty() {
            if (specialty <= 0 || currentRolls.length === 0) return;
            
            const failureIndex = currentRolls.findIndex(roll => roll.type === 'failure');
            
            if (failureIndex === -1) {
                showNotification('Нет кубов для переброса!', 'failure');
                return;
            }
            
            specialty--;
            updateSpecialtyDisplay();
            
            const oldRoll = currentRolls[failureIndex];
            const oldValue = oldRoll.value;
            
            const newValue = Math.floor(Math.random() * 10) + 1;
            const evaluation = evaluateDie(newValue);
            
            currentRolls[failureIndex] = {
                value: newValue,
                type: evaluation.type,
                successes: evaluation.successes,
                rerolled: true
            };
            
            currentSuccesses = currentRolls.reduce((sum, roll) => sum + roll.successes, 0);
            
            displayResults();
            updateActionButtons();
            
            if (evaluation.type === 'failure') {
                showNotification('Неудача! Переброс не помог', 'failure');
                addToHistory('✨ Исп. Особенности', currentSuccesses, currentRolls, `Переброс ${oldValue}→${newValue} (неудача)`);
            } else {
                const successText = evaluation.type === 'critical' ? 'Критический успех!' : 'Успех!';
                showNotification(`${successText} Переброс удачен!`, 'success');
                addToHistory('✨ Исп. Особенности', currentSuccesses, currentRolls, `Переброс ${oldValue}→${newValue} (успех)`);
            }
        }
        
        // Показ уведомления
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // Добавление в историю
        function addToHistory(action, successes, rolls, note = '') {
            const diceResults = rolls.map(r => {
                if (r.type === 'critical') return `${r.value}✨`;
                if (r.type === 'success') return `${r.value}✓`;
                return `${r.value}`;
            }).join(' ');
            
            const record = {
                action: action,
                successes: successes,
                diceResults: diceResults,
                note: note,
                timestamp: new Date().toLocaleTimeString()
            };
            
            history.unshift(record);
            
            if (history.length > MAX_HISTORY) {
                history.pop();
            }
            
            updateHistoryDisplay();
        }
        
        // Обновление отображения истории
        function updateHistoryDisplay() {
            const historyElement = document.getElementById('historyList');
            
            if (history.length === 0) {
                historyElement.innerHTML = '<div class="history-item">История пуста</div>';
                return;
            }
            
            historyElement.innerHTML = history.map((record) => {
                const noteText = record.note ? ` (${record.note})` : '';
                return `
                    <div class="history-item">
                        ${record.timestamp} | ${record.action}: ${record.successes} успехов${noteText}<br>
                        <span style="opacity: 0.7;">🎲 ${record.diceResults}</span>
                    </div>
                `;
            }).join('');
        }
        
        // Очистка истории
        function clearHistory() {
            history = [];
            updateHistoryDisplay();
        }
        
        // Запуск
        init();
    </script>
</body>
</html>
