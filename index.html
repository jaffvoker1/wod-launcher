<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Darkness</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(30, 30, 30, 0.9);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(139, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #8b0000;
            font-size: 36px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* Сетка 2x2 */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .game-card {
            background: #2a2a2a;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #444;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 0, 0, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #8b0000;
            box-shadow: 0 15px 40px rgba(139, 0, 0, 0.3);
        }

        .game-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 22px;
            font-weight: bold;
            color: #8b0000;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .game-desc {
            font-size: 13px;
            color: #999;
            line-height: 1.4;
        }

        /* Адаптация для телефонов */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 24px;
            }
            .games-grid {
                gap: 15px;
            }
            .game-card {
                padding: 25px 15px;
            }
            .game-icon {
                font-size: 48px;
            }
            .game-title {
                font-size: 16px;
            }
            .game-desc {
                font-size: 10px;
            }
        }

        /* Кнопка сброса (опционально) */
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌑 WORLD OF DARKNESS</h1>
        <div class="subtitle">ВЫБЕРИ СВОЮ ИСТОРИЮ</div>

        <div class="games-grid">
            <!-- Vampire: The Masquerade -->
            <div class="game-card" onclick="openGame('VTM20_FULL.html')">
                <div class="game-icon">🩸</div>
                <div class="game-title">VAMPIRE</div>
                <div class="game-desc">The Masquerade<br>Лист персонажа V20</div>
            </div>

            <!-- Mage: The Ascension -->
            <div class="game-card" onclick="openGame('Mage_WOD.html')">
                <div class="game-icon">🔮</div>
                <div class="game-title">MAGE</div>
                <div class="game-desc">The Ascension<br>Лист мага</div>
            </div>

            <!-- Hunter: The Reckoning -->
            <div class="game-card" onclick="openGame('Hunt_WOD.html')">
                <div class="game-icon">⚔️</div>
                <div class="game-title">HUNTER</div>
                <div class="game-desc">The Reckoning<br>Лист охотника</div>
            </div>

            <!-- Dice Simulator -->
            <div class="game-card" onclick="openGame('Dice.html')">
                <div class="game-icon">🎲</div>
                <div class="game-title">DICE</div>
                <div class="game-desc">Симулятор кубов<br>Бросай D10!</div>
            </div>
        </div>

        <div class="footer">
            ⚡ Нажми на любую карточку, чтобы открыть
        </div>
    </div>

    <script>
        function openGame(fileName) {
            window.open(fileName, '_blank');
        }
    </script>
</body>
</html>
